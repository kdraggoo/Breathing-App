name: iOS Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.0'
        bundler-cache: true
        working-directory: ios
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install CocoaPods
      run: |
        cd ios
        pod install
        
    - name: Cache CocoaPods
      uses: actions/cache@v4
      with:
        path: ios/Pods
        key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-
          
    - name: Run iOS tests
      run: |
        cd ios
        xcodebuild test -workspace ChildBreathingApp.xcworkspace -scheme ChildBreathingApp -destination 'platform=iOS Simulator,name=iPhone 14,OS=latest'
        
    - name: Build iOS app (Debug)
      run: |
        cd ios
        xcodebuild -workspace ChildBreathingApp.xcworkspace -scheme ChildBreathingApp -configuration Debug -destination 'generic/platform=iOS' -archivePath ChildBreathingApp.xcarchive archive
        
    - name: Build iOS app (Release)
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        cd ios
        xcodebuild -workspace ChildBreathingApp.xcworkspace -scheme ChildBreathingApp -configuration Release -destination 'generic/platform=iOS' -archivePath ChildBreathingApp.xcarchive archive
        
    - name: Export IPA
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        cd ios
        xcodebuild -exportArchive -archivePath ChildBreathingApp.xcarchive -exportPath . -exportOptionsPlist exportOptions.plist
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        
    - name: Upload IPA artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: ios/*.ipa
        retention-days: 30
        
    - name: Upload to TestFlight (Release only)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: apple-actions/upload-testflight-build@v1
      with:
        app-path: ios/*.ipa
        issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
        api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}