name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-validation:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Validate PR title
      uses: amannn/action-semantic-pull-request@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        types: |
          feat
          fix
          docs
          style
          refactor
          test
          chore
          perf
          ci
          build
          revert
          
    - name: Check for breaking changes
      run: |
        if git log --oneline ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | grep -i "BREAKING CHANGE"; then
          echo "⚠️ This PR contains breaking changes!"
          echo "breaking_change=true" >> $GITHUB_OUTPUT
        else
          echo "✅ No breaking changes detected"
          echo "breaking_change=false" >> $GITHUB_OUTPUT
        fi
      id: breaking_changes
      
    - name: Label PR
      uses: actions/github-script@v7
      with:
        script: |
          const { data: labels } = await github.rest.issues.listLabelsOnIssue({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const hasBreakingChange = '${{ steps.breaking_changes.outputs.breaking_change }}' === 'true';
          const breakingLabel = 'breaking-change';
          const hasBreakingLabel = labels.some(label => label.name === breakingLabel);
          
          if (hasBreakingChange && !hasBreakingLabel) {
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [breakingLabel]
            });
          }
          
    - name: Comment on PR
      if: steps.breaking_changes.outputs.breaking_change == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '⚠️ **Breaking Change Detected**\n\nThis PR contains breaking changes. Please ensure:\n- [ ] Version is bumped appropriately\n- [ ] Migration guide is updated\n- [ ] Stakeholders are notified'
          });
          
  size-limit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check bundle size
      run: |
        # Create bundles for comparison
        npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output current-android.js
        
        # Get current size
        CURRENT_SIZE=$(wc -c < current-android.js)
        echo "Current bundle size: $CURRENT_SIZE bytes"
        
        # Compare with base branch if available
        if git show origin/${{ github.event.pull_request.base.ref }}:package.json > /dev/null 2>&1; then
          git checkout origin/${{ github.event.pull_request.base.ref }}
          npm ci
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output base-android.js
          BASE_SIZE=$(wc -c < base-android.js)
          
          DIFF=$((CURRENT_SIZE - BASE_SIZE))
          PERCENT_CHANGE=$(echo "scale=2; $DIFF * 100 / $BASE_SIZE" | bc -l)
          
          echo "Base bundle size: $BASE_SIZE bytes"
          echo "Size difference: $DIFF bytes ($PERCENT_CHANGE%)"
          
          if [ $DIFF -gt 50000 ]; then
            echo "❌ Bundle size increased significantly!"
            exit 1
          else
            echo "✅ Bundle size change is acceptable"
          fi
        fi