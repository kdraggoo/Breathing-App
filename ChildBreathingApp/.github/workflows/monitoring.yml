name: Monitoring & Health Checks

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check project health
      run: |
        echo "## Project Health Report" > health-report.md
        echo "Generated: $(date)" >> health-report.md
        echo "" >> health-report.md
        
        # Check for outdated dependencies
        echo "### Outdated Dependencies" >> health-report.md
        npm outdated --json > outdated.json || true
        if [ -s outdated.json ]; then
          echo "⚠️ Found outdated dependencies:" >> health-report.md
          cat outdated.json >> health-report.md
        else
          echo "✅ All dependencies are up to date" >> health-report.md
        fi
        echo "" >> health-report.md
        
        # Check bundle size
        echo "### Bundle Size" >> health-report.md
        npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output bundle.js
        BUNDLE_SIZE=$(wc -c < bundle.js)
        echo "Current bundle size: $BUNDLE_SIZE bytes" >> health-report.md
        echo "" >> health-report.md
        
        # Check test coverage
        echo "### Test Coverage" >> health-report.md
        npm run test:ci > test-output.txt 2>&1 || true
        if grep -q "All files" test-output.txt; then
          echo "✅ Tests passed with coverage:" >> health-report.md
          grep "All files" test-output.txt >> health-report.md
        else
          echo "❌ Tests failed or no coverage data" >> health-report.md
        fi
        
    - name: Create issue for health report
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('health-report.md', 'utf8');
          
          // Check if there's already an open health report issue
          const { data: issues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: 'health-report',
            state: 'open'
          });
          
          if (issues.length > 0) {
            // Update existing issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issues[0].number,
              body: report
            });
          } else {
            // Create new issue if there are any warnings
            if (report.includes('⚠️') || report.includes('❌')) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Project Health Report - Action Required',
                body: report,
                labels: ['health-report', 'maintenance']
              });
            }
          }
          
  dependency-audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Audit dependencies
      run: |
        npm audit --json > audit-report.json || true
        
    - name: Process audit results
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const auditData = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
          
          if (auditData.metadata && auditData.metadata.vulnerabilities) {
            const vulns = auditData.metadata.vulnerabilities;
            const totalVulns = vulns.info + vulns.low + vulns.moderate + vulns.high + vulns.critical;
            
            if (totalVulns > 0) {
              const body = `## Security Audit Alert
              
Found ${totalVulns} vulnerabilities:
- Critical: ${vulns.critical}
- High: ${vulns.high}
- Moderate: ${vulns.moderate}
- Low: ${vulns.low}
- Info: ${vulns.info}

Please run \`npm audit fix\` to address these issues.`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Security Vulnerabilities Detected',
                body: body,
                labels: ['security', 'urgent']
              });
            }
          }
          
  performance-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Performance benchmark
      run: |
        echo "Running performance benchmarks..."
        
        # Bundle analysis
        npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android-bundle.js
        npx react-native bundle --platform ios --dev false --entry-file index.js --bundle-output ios-bundle.js
        
        ANDROID_SIZE=$(wc -c < android-bundle.js)
        IOS_SIZE=$(wc -c < ios-bundle.js)
        
        echo "Android bundle size: $ANDROID_SIZE bytes"
        echo "iOS bundle size: $IOS_SIZE bytes"
        
        # Set thresholds (in bytes)
        THRESHOLD=2000000  # 2MB
        
        if [ $ANDROID_SIZE -gt $THRESHOLD ] || [ $IOS_SIZE -gt $THRESHOLD ]; then
          echo "Bundle size exceeded threshold!"
          echo "android_size=$ANDROID_SIZE" >> $GITHUB_OUTPUT
          echo "ios_size=$IOS_SIZE" >> $GITHUB_OUTPUT
          echo "threshold_exceeded=true" >> $GITHUB_OUTPUT
        else
          echo "Bundle sizes are within acceptable limits"
          echo "threshold_exceeded=false" >> $GITHUB_OUTPUT
        fi
      id: performance
      
    - name: Create performance alert
      if: steps.performance.outputs.threshold_exceeded == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const androidSize = '${{ steps.performance.outputs.android_size }}';
          const iosSize = '${{ steps.performance.outputs.ios_size }}';
          
          const body = `## Performance Alert: Bundle Size Exceeded
          
The app bundle sizes have exceeded the recommended threshold:

- Android: ${androidSize} bytes
- iOS: ${iosSize} bytes
- Threshold: 2,000,000 bytes

Consider:
- Code splitting
- Removing unused dependencies  
- Optimizing assets
- Tree shaking improvements`;

          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'Performance Alert: Large Bundle Size',
            body: body,
            labels: ['performance', 'optimization']
          });