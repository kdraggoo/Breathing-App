sonar.projectKey=childbreathingapp
sonar.organization=your-org
sonar.projectName=Child Breathing App
sonar.projectVersion=1.0

# Source code
sonar.sources=src
sonar.tests=__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Language
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/coverage/**,**/android/**,**/ios/**,**/*.d.ts

# Test exclusions
sonar.test.exclusions=**/node_modules/**

# Coverage exclusions
sonar.coverage.exclusions=**/node_modules/**,**/__tests__/**,**/*.test.*,**/*.spec.*,**/coverage/**,**/android/**,**/ios/**

# Duplication exclusions
sonar.cpd.exclusions=**/node_modules/**,**/__tests__/**